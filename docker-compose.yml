services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uniclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uniclub_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-uniclub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uniclub} -d ${POSTGRES_DB:-uniclub}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-uniclub};Username=${POSTGRES_USER:-uniclub};Password=${POSTGRES_PASSWORD:-uniclub_dev_password}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-60}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      AppUrl: ${APP_URL:-http://localhost:54610}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-https://localhost:54610,http://localhost:54610}
      Auth__CrossOriginCookies: ${AUTH_CROSS_ORIGIN_COOKIES:-false}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME:-demo}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY:-123456789012345}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET:-abcdefghijklmnopqrstuvwxyz}
      SendGrid__ApiKey: ${SENDGRID_API_KEY:-}
      SendGrid__FromName: ${SENDGRID_FROM_NAME:-UniClub Hub}
      SendGrid__FromAddress: ${SENDGRID_FROM_ADDRESS:-noreply@example.com}
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      Gemini__Model: ${GEMINI_MODEL:-gemini-flash-latest}

volumes:
  pgdata:
